# ~/.claude/ollama.conf — Ollama routing configuration
# Sourced by: limit-watchdog.sh (Stop hook) and claude() shell wrapper
# Edit freely — re-running install.sh will NOT overwrite this file.

# Enable text-based detection of rate limits (SECONDARY detection path).
# Default: false — PRIMARY detection via history.jsonl is deterministic and sufficient.
# Set to true ONLY if PRIMARY detection misses genuine limits in your environment.
# WARNING: enabling this with a broad LIMIT_PATTERN causes false positives — Claude's
# normal responses about API design, rate limits in code, etc. will trigger Ollama handover.
# ENABLE_TEXT_DETECTION=false

# Regex matched against last_assistant_message when ENABLE_TEXT_DETECTION=true.
# Default is narrow (Anthropic-specific phrases). Extend with | to add alternatives.
# LIMIT_PATTERN="hit your limit|out of free messages|rate.?limit.*exceeded|exceeded.*rate.?limit|resets [0-9]+:[0-9]+(am|pm)"

# Default Ollama model when no model has been saved via the interactive picker.
# OLLAMA_DEFAULT_MODEL="kimi-k2.5:cloud"

# Ollama server address. Change if running on a non-default port or remote host.
# OLLAMA_HOST="http://localhost:11434"
